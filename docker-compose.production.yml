# docker-compose.production.yml

volumes:
  pg_data_production:
  static_volume:

# Всё отличие — заменяем build на image и указываем, какой образ использовать
services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data
  backend:
  image: maksim1995/taski_backend:latest
  env_file: .env
  depends_on:
    - db
  environment:
    DB_HOST: db
    DB_PORT: 5432
  volumes:
    - static_volume:/backend_static
    - media_volume:/app/media
  frontend:
    image: maksim1995/taski_frontend  # Качаем с Docker Hub
    env_file: .env
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static_volume:/frontend_static
  gateway:
    image: maksim1995/taski_gateway  # Качаем с Docker Hub
    env_file: .env
    volumes:
      - static_volume:/staticfiles/
    ports:
      - 8000:80