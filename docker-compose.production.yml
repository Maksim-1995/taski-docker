volumes:
  pg_data_production:
  static_volume:
  media_volume:

services:
  db:
    image: postgres:13.10
    env_file: .env
    restart: always
    volumes:
      - pg_data_production:/var/lib/postgresql/data

  backend:
    image: maksim1995/taski_backend:latest
    env_file: .env
    restart: always
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - static_volume:/backend_static
      - media_volume:/app/media

  frontend:
    image: maksim1995/taski_frontend
    env_file: .env
    restart: always
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static_volume:/frontend_static

  gateway:
    image: maksim1995/taski_gateway
    env_file: .env
    restart: always
    depends_on:
      - backend
    volumes:
      - static_volume:/staticfiles/
    ports:
      - 8000:80
